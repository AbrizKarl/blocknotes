<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockNotes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>BlockNotes</h1>
  <p>A simple notes app where each note is a "block" in a chain.</p>

  <div class="form-box">
    <input type="text" id="noteTitle" placeholder="Title">
    <textarea id="noteBody" placeholder="Write your note here..." rows="4"></textarea>
    <button id="addBtn">Add Note</button>
  </div>

  <input type="text" id="searchInput" placeholder="Search notes...">

  <h2>Your Notes (<span id="noteCount">0</span>)</h2>

  <div id="notesList"></div>

  <p id="emptyMessage">No notes yet. Add one above!</p>

  <!-- Edit popup -->
  <div id="editBox" class="hidden">
    <h3>Edit Note</h3>
    <input type="text" id="editTitle">
    <textarea id="editBody" rows="4"></textarea>
    <button id="saveEditBtn">Save</button>
    <button id="cancelEditBtn">Cancel</button>
  </div>

  <!-- This loads the Supabase library so we can talk to our database -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
